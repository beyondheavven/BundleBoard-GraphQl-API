services:
  app:
    container_name: bundleboard_api
    build: .
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslMode=verify-full
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE}

      - SERVER_PORT=${SERVER_PORT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_METHODS=${ALLOWED_METHODS}
      - ALLOWED_HEADERS=${ALLOWED_HEADERS}
      - ALLOWED_CREDENTIALS=${ALLOWED_CREDENTIALS}
      - EXPOSED_HEADERS=${EXPOSED_HEADERS}
      - MAX_AGE=${MAX_AGE}

      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}

      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8080:8080"
    networks:
      - bundleboard_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command:
      -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml
      - loki-data:/loki
    networks:
      - bundleboard_net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - bundleboard_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - loki
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/imported
    networks:
      - bundleboard_net


volumes:
  loki-data:
  grafana-storage:

networks:
  bundleboard_net:
    driver: bridge