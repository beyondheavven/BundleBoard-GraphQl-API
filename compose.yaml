services:
  app:
    container_name: bundleboard_api
    build: .
    environment:
      - SPRING_R2DBC_URL=r2dbc:postgresql://${POSTGRES_URL}:${POSTGRES_PORT}/${POSTGRES_DB}
      - POSTGRES_SCHEMA=public
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE}

      - SERVER_PORT=${SERVER_PORT}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ALLOWED_METHODS=${ALLOWED_METHODS}
      - ALLOWED_HEADERS=${ALLOWED_HEADERS}
      - ALLOWED_CREDENTIALS=${ALLOWED_CREDENTIALS}
      - EXPOSED_HEADERS=${EXPOSED_HEADERS}
      - MAX_AGE=${MAX_AGE}

      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY}

      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE}
      - EMAIL_VERIFICATION_TTL_MS=${EMAIL_VERIFICATION_TTL_MS}
      - EMAIL_HASH_ALGORITHM=${EMAIL_HASH_ALGORITHM}
      - EMAIL_HEX_FORMAT=${EMAIL_HEX_FORMAT}
      - EMAIL_HASH_LENGTH=${EMAIL_HASH_LENGTH}
      - EMAIL_BYTE_LENGTH=${EMAIL_BYTE_LENGTH}
      - VERIFY_EMAIL_URL=${VERIFY_EMAIL_URL}

      - SPRING_PROFILES_ACTIVE=dev
      - BLOCK_DURATION_SECONDS=${BLOCK_DURATION_SECONDS}
      - MAX_ATTEMPTS=${MAX_ATTEMPTS}
    ports:
      - "8080:8080"
    networks:
      - bundleboard_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command:
      -config.file=/etc/loki/local-config.yml.ro
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yml.ro
      - loki-data:/loki
    networks:
      - bundleboard_net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml.ro
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml.ro
    depends_on:
      - loki
    networks:
      - bundleboard_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    depends_on:
      - loki
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml.ro
      - ./monitoring/grafana/provisioning/dashboards/dashboard.yml:/etc/grafana/provisioning/dashboards/dashboard.yml.ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/imported
    networks:
      - bundleboard_net


volumes:
  loki-data:
  grafana-storage:

networks:
  bundleboard_net:
    driver: bridge