spring:


  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/stub_db
    username: stub_user
    password: stub_password
    pool:
      enabled: true
      initial-size: 5
      max-size: 10

  mail:
    test-connection: false

app:
  auth:
    social-password-secret: test-secret-key
  
  jwt:
    access-token-expiration-ms: 60000
    refresh-token-expiration-ms: 120000
    secret: super-secret-test-key-must-be-long-enough-for-hs512

  s3:
    endpoint: http://localhost:4566
    bucket: test-bucket