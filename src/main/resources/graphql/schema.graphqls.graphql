type Query {
    getUserById(id:ID!): User
    getAllUsers: [User]
}

type User{
    id: ID!
    username: String!
    email: String!
    role: UserRole!
    password_hash: String!
    avatar_url: String
    status: UserStatus!
}

enum UserRole {
    ADMIN, AUTHOR, CLIENT
}

enum UserStatus {
    ACTIVE, INACTIVE, BANNED
}


