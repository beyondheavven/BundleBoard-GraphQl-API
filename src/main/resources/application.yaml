spring:
  profiles:
    active: dev
  application:
    name: bundleboard
  r2dbc:
    url: r2dbc:postgresql://${POSTGRES_URL}:${POSTGRES_PORT:6543}/${POSTGRES_DB:postgres}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    pool:
      enabled: true
      initial-size: ${DB_POOL_SIZE}
      max-size: ${DB_MAX_POOL_SIZE}

  graphql:
    graphiql:
      enabled: true
      show-exceptions: true
    schema:
      inspection:
        enabled: true
      printer:
        enabled: true
    cors:
      allowed-origins: ${ALLOWED_ORIGINS}
      allowed-methods: ${ALLOWED_METHODS}
      allowed-headers: ${ALLOWED_HEADERS}
      allowed-credentials: ${ALLOWED_CREDENTIALS}
      exposed-headers: ${EXPOSED_HEADERS}
      max-age: ${MAX_AGE}
  webflux:
    base-path: /api

logging:
  level:
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG

server:
  port: ${SERVER_PORT}

app:
  jwt:
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRY}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRY}
    secret: ${JWT_SECRET}
